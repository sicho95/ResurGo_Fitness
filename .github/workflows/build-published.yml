name: Build Published App

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/build-static.mjs"
      - ".github/workflows/build-published.yml"

jobs:
  build-published:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build published files
        run: node scripts/build-static.mjs

      - name: Commit published files
        run: |
          if git diff --quiet -- app.js index.html styles.css sw.js manifest.webmanifest icon.svg version.json assets docs workers; then
            echo "No published changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html styles.css sw.js manifest.webmanifest icon.svg version.json assets docs workers
          git rm -r --ignore-unmatch assets/app
          git commit -m "Build published app from src [skip ci]"
          git push
