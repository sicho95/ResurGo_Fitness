name: Publish WebApp

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/build-static.mjs"
      - ".github/workflows/publish-webapp.yml"

jobs:
  publish-webapp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build WebApp branch content
        run: node scripts/build-static.mjs --out .webapp-build

      - name: Publish to WebApp branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd .webapp-build
          git init
          git checkout -b WebApp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish WebApp from ${GITHUB_SHA::7}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin WebApp
